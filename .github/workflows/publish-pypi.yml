name: Publish to PyPI

# Triggers on every git tag like v0.1.0, v0.2.0, etc.
# Requires PyPI Trusted Publishing configured at https://pypi.org/manage/account/publishing/
# No API token stored anywhere. GitHub Actions authenticates to PyPI via OIDC.
#
# One-time setup (after first creating a free PyPI account):
# 1. Go to https://pypi.org/manage/account/publishing/
# 2. Click "Add a new pending publisher"
# 3. PyPI Project Name:    agent-guard-plugins
#    Owner:                dannyliv
#    Repository name:      agent-guard-plugins
#    Workflow name:        publish-pypi.yml
#    Environment name:     pypi (matches the `environment:` line below)
# 4. Push a git tag: git tag v0.1.0 && git push origin v0.1.0
# That's it. Subsequent tags auto-publish; no secrets stored.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: pip install -e ".[modernbert]" pytest
      - run: pytest tests/ -v -m "not slow"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install build deps
        run: python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-guard-plugins
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
